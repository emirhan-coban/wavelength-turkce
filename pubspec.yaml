name: wavelength
description: "Zihindar - Türkçe Wavelength Parti Oyunu"
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2

  # Firebase
  firebase_core: ^3.12.1
  cloud_firestore: ^5.6.7
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon_1024x1024.png"
  adaptive_icon_background: "#221710"
  adaptive_icon_foreground: "assets/images/icon_512x512.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
